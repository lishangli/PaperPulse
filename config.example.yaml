# PaperPulse Configuration for Testing
# Using pi as ACP backend (no API key needed)

project:
  name: "paperpulse"
  timezone: "Asia/Shanghai"
  log_level: "INFO"

# ========================================
# Daily Reading Configuration
# ========================================
daily_reading:
  enabled: true
  total_papers: 10  # Total papers per day
  
  domains:
    - name: "math"
      weight: 25  # 25% = 2-3 papers (increased for computational math)
      categories:
        - math.NA  # Numerical Analysis (计算数学)
        - math.AP  # Analysis of PDEs
        - math.CO  # Combinatorics
        - math.ST  # Statistics
        - math.IT  # Information Theory
        - math.PR  # Probability
      keywords:
        - numerical
        - PDE
        - differential equation
        - computational
        - hyperbolic
        - plasma
    
    - name: "ai_theory"
      weight: 25  # 25% = 2-3 papers
      categories:
        - cs.AI
        - cs.LG
        - cs.CL
      keywords: []
    
    - name: "ai_os_compiler"
      weight: 25  # 25% = 2-3 papers
      categories:
        - cs.AR  # Architecture
        - cs.OS  # Operating Systems
      keywords:
        - compiler
        - operating system
        - OS
        - systems
    
    - name: "ai_infrastructure"
      weight: 25  # 25% = 2-3 papers
      categories:
        - cs.DC  # Distributed Computing
        - cs.NI  # Networking
      keywords:
        - infrastructure
        - distributed
        - cloud
        - GPU
        - cluster

# ========================================
# Data Sources Configuration
# ========================================
sources:
  arxiv:
    enabled: true
    categories:
      - cs.AI
      - cs.CL
    keywords: []
    max_papers_per_day: 10
  
  semantic_scholar:
    enabled: false
  
  papers_with_code:
    enabled: false

# ========================================
# Document Acquisition
# ========================================
document:
  prefer_latex_source: false
  
  pdf:
    enabled: false
  
  converter:
    backend: "mineru"

# ========================================
# LLM Configuration - Using pi ACP Backend
# ========================================
llm:
  backend: "pi"
  primary_model: "aliyun/kimi-k2.5"
  thinking_level: "medium"

# ========================================
# Scheduler Configuration
# ========================================
scheduler:
  enabled: false

# ========================================
# Obsidian Configuration
# ========================================
obsidian:
  enabled: false

# ========================================
# Storage Configuration
# ========================================
storage:
  database: "./data/papers.db"
  pdf_dir: "./data/pdfs"
  latex_dir: "./data/latex"
  markdown_dir: "./data/markdown"
  retention_days: 90

# ========================================
# Output Configuration
# ========================================
output:
  reports_dir: "./reports"
  formats:
    - markdown

# ========================================
# AutoResearchClaw Integration
# ========================================
integration:
  researchclaw:
    enabled: true
    path: "/home/lishangli/repos/AutoResearchClaw"
    venv_path: "/home/lishangli/repos/AutoResearchClaw/.venv"
    auto_run: true        # Enable auto-research in auto pipeline
    require_confirmation: false  # No confirmation needed for auto mode

# ========================================
# IDEA Generation
# ========================================
ideas:
  enabled: true
  papers_per_idea: 3
  max_ideas_per_day: 5
  min_novelty_score: 0.5

# ========================================
# Notion Sync Configuration
# ========================================
notion:
  enabled: true
  api_key: "YOUR_NOTION_API_KEY_HERE"
  target_database: "Shangli Blog"
  create_new_pages: true
  clear_previous: false
  rate_limit_delay: 0.5
  
  # Category auto-detection rules
  category_rules:
    default: "Research"
    rules:
      - category: "AI"
        keywords:
          - ai
          - llm
          - agent
          - neural
          - deep
          - machine learning
          - benchmark
      - category: "Compiler"
        keywords:
          - compiler
          - cgra
          - scheduling
          - optimization
          - hardware
          - modulo
      - category: "Math"
        keywords:
          - math
          - proof
          - equation
          - theorem
          - hyperbolic
          - particle
          - plasma
      - category: "System"
        keywords:
          - system
          - os
          - infrastructure
          - distributed
  
  # Common tags for extraction
  common_tags:
    - AI
    - LLM
    - Agent
    - Compiler
    - CGRA
    - Scheduling
    - Optimization
    - Research
    - Survey
    - Benchmark
    - Math
    - Neural
    - Deep Learning
    - Plasma
    - Hyperbolic
  
  # Property settings
  summary_max_length: 150
  max_tags_per_page: 5

# ========================================
# Synthesis Report Configuration
# ========================================
synthesis:
  enabled: true
  max_content_chars: 50000  # ~12k tokens
  llm_call_interval: 10  # seconds between LLM calls
  filename_format: "{arxiv_id}_synthesis_{date}"

# ========================================
# arXiv API Configuration
# ========================================
arxiv_api:
  rate_limit_wait: 3  # seconds between requests (arXiv requires >=3s)
  retry_count: 3
  retry_wait: 5  # seconds before retry

# ========================================
# CLI Defaults Configuration
# ========================================
cli_defaults:
  collect_days: 7
  collect_limit: 20
  convert_mode: "auto"
  convert_pdf_dir: "data/pdfs"
  analyze_limit: 10
  synthesis_days: 1
  synthesis_limit: 5
  ideas_num: 5
  ideas_min_score: 0.6
  list_limit: 10
  notion_rate_limit: 0.5
  notion_pattern: "*.md"

# ========================================
# Paths Configuration
# ========================================
paths:
  paperpulse_dir: "."  # relative to config file
  log_dir: "./logs"
  bin_dir: "${HOME}/.local/bin"